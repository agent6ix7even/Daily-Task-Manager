appId: com.dailytasks.desktop
productName: Дневник задач
directories:
  output: release
  buildResources: build
files:
  - dist/**
  - dist-electron/**
  - package.json
win:
  target:
    - target: nsis
      arch: [x64]
  signAndEditExecutable: false
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
mac:
  target:
    - target: zip
      arch: [x64, arm64]
  category: public.app-category.productivity
linux:
  target:
    - AppImage
  category: Utility
